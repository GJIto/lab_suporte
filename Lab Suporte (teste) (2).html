document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

s panelin{from{opacity:0;transform:translateX(18px)}to{opacity:1;transform:translateX(0)}}\n/* Scrollbar corporativa discreta */\n.app-main *::-webkit-scrollbar{width:10px;height:10px}\n.app-main *::-webkit-scrollbar-thumb{background:#c4ccd6;border-radius:8px;border:2px solid #F2F2F2}\n.app-main *::-webkit-scrollbar-thumb:hover{background:#a7b2c0}\n.app-aside{transition:width .28s cubic-bezier(.4,0,.2,1),flex-basis .28s cubic-bezier(.4,0,.2,1)}\n.nav-scroll{scrollbar-width:none;-ms-overflow-style:none}\n.nav-scroll::-webkit-scrollbar{width:0;height:0;display:none}\n.nav-collapsed .app-aside{width:74px!important;flex-basis:74px!important}\n.nav-collapsed .nav-label{opacity:0;max-width:0;overflow:hidden;white-space:nowrap;pointer-events:none}\n.nav-collapsed .nav-hidec{display:none!important}\n.nav-collapsed .app-aside nav button{justify-content:center;gap:0}\n.nav-collapsed .app-aside .brand-row{justify-content:center}\n.nav-collapsed .app-aside .foot-row{justify-content:center}\n.nav-label{transition:opacity .18s ease}\n/* Impressão — só a folha de etiquetas aparece */\n@media print{\n  @page{size:A4;margin:12mm}\n  html,body{background:#fff!important}\n  body *{visibility:hidden!important}\n  #label-sheet, #label-sheet *{visibility:visible!important}\n  #label-sheet{position:absolute!important;inset:0!important;background:#fff!important;padding:0!important}\n  #label-sheet .lbl-toolbar{display:none!important}\n  #label-sheet .lbl-grid{grid-template-columns:repeat(2,1fr)!important;gap:6mm!important}\n  #label-sheet .lbl-card{break-inside:avoid;box-shadow:none!important}\n  #report-sheet, #report-sheet *{visibility:visible!important}\n  #report-sheet{position:absolute!important;inset:0!important;background:#fff!important;padding:0!important;box-shadow:none!important;max-width:none!important;border-radius:0!important}\n  #report-sheet .rep-toolbar{display:none!important}\n  #report-sheet .rep-block{break-inside:avoid}\n}\n/* ===== Responsividade — modo Mobile (classe .vm-mobile no <html>) ===== */\n.vm-toggle{position:fixed;right:16px;bottom:16px;z-index:9700;display:inline-flex;background:#fff;border:1px solid #dce2ea;border-radius:999px;padding:4px;gap:2px;box-shadow:0 10px 30px rgba(16,26,45,.20);font-family:'Hanken Grotesk','Segoe UI',Arial,sans-serif}\n.vm-toggle button{cursor:pointer;border:0;background:transparent;color:#67788c;display:inline-flex;align-items:center;gap:6px;padding:9px 15px;border-radius:999px;font-size:12.5px;font-weight:700;font-family:inherit;transition:background .22s ease,color .22s ease}\n.vm-toggle button .msi{font-size:18px}\n.vm-toggle button.on{background:#111114;color:#fff}\n.vm-toggle .vm-seg{display:inline-flex;align-items:center;gap:2px}\n.vm-toggle .vm-restore{display:none}\n.vm-toggle .vm-min-btn{cursor:pointer;border:0;background:transparent;color:#a7b2c0;display:inline-flex;align-items:center;justify-content:center;padding:9px;border-radius:999px;font-family:inherit;margin-left:2px}\n.vm-toggle .vm-min-btn:hover{color:#111114;background:#f4f6f9}\n.vm-toggle .vm-min-btn .msi{font-size:16px}\n.vm-toggle.vm-min{padding:0;border:0;background:transparent;box-shadow:none}\n.vm-toggle.vm-min .vm-seg{display:none}\n.vm-toggle.vm-min .vm-restore{display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:50%;cursor:pointer;border:1px solid #e0e5ec;background:#fff;color:#8090a3;box-shadow:0 6px 18px rgba(16,26,45,.14);opacity:.72;transition:opacity .2s ease,color .2s ease}\n.vm-toggle.vm-min .vm-restore:hover{opacity:1;color:#111114}\n.vm-toggle.vm-min .vm-restore .msi{font-size:20px}\n.vm-hamburger{display:none}\n.vm-backdrop{display:none}\n.vm-mobile .vm-hamburger{display:inline-flex}\n.vm-mobile .app-aside{position:fixed!important;left:0!important;top:0!important;height:100vh!important;width:262px!important;flex-basis:262px!important;z-index:9300;transform:translateX(-100%);transition:transform .3s cubic-bezier(.4,0,.2,1);box-shadow:0 0 50px rgba(0,0,0,.45)}\n.vm-mobile.mnav-open .app-aside{transform:none!important}\n.vm-mobile .vm-backdrop{display:block;position:fixed;inset:0;background:rgba(10,14,20,.5);z-index:9250;opacity:0;pointer-events:none;transition:opacity .3s ease}\n.vm-mobile.mnav-open .vm-backdrop{opacity:1;pointer-events:auto}\n.vm-mobile .nav-collapsed .app-aside,.vm-mobile.nav-collapsed .app-aside{width:262px!important;flex-basis:262px!important}\n.vm-mobile .nav-label{opacity:1!important;max-width:none!important}\n.vm-mobile .app-main{height:auto;min-height:100vh}\n.vm-mobile .app-header{padding:11px 14px;gap:10px;flex-wrap:wrap;position:sticky;top:0;z-index:55}\n.vm-mobile .app-header .app-search{order:5;flex:1 1 100%;max-width:none;min-width:0}\n.vm-mobile .app-header button{min-height:42px}\n.vm-mobile .app-main [style*=\"padding:24px 28px\"]{padding:16px 14px!important}\n.vm-mobile [style*=\"grid-template-columns\"]:not([data-table]){grid-template-columns:1fr!important}\n.vm-mobile .inv-tablecard{overflow-x:auto;-webkit-overflow-scrolling:touch}\n.vm-mobile [data-table]{min-width:660px}\n.vm-mobile [style*=\"width:380px\"]{width:min(380px,86vw)!important}\n/* ---- Mobile nativo: bottom nav, cards, top bar compacto ---- */\n.vm-only{display:none}\n.vm-mobile .vm-only{display:block}\n.vm-cardlist{display:none}\n.vm-mobile .vm-cardlist{display:flex;flex-direction:column;gap:10px}\n.vm-mobile .vm-hide{display:none!important}\n.vm-mobile .vm-crumb{display:none!important}\n.vm-mobile .app-header{padding:10px 14px;gap:9px}\n.vm-mobile .app-header [style*=\"font-size:21px\"]{font-size:18px}\n.vm-bottomnav{display:none}\n.vm-mobile .vm-bottomnav{display:flex;position:fixed;left:0;right:0;bottom:0;z-index:9100;background:#fff;border-top:1px solid #e0e5ec;padding:6px 4px;padding-bottom:calc(6px + env(safe-area-inset-bottom));box-shadow:0 -4px 20px rgba(16,26,45,.08)}\n.vm-bottomnav button{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;border:0;back
